<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Leaderboard</title>
    <!-- 구글 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 1rem;
            overflow-x: hidden;
        }

        /* 배경 장식 애니메이션 원형 */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob1 { width: 300px; height: 300px; background: #c026d3; top: -100px; left: -100px; }
        .blob2 { width: 400px; height: 400px; background: #3b82f6; bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #e879f9, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--accent-glow);
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* Glassmorphism 카드 리스트 */
        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, background 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* 상위 3등 하이라이트 */
        .card[data-rank="1"]::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; }
        .card[data-rank="2"]::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #94a3b8; box-shadow: 0 0 15px #94a3b8; }
        .card[data-rank="3"]::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #b45309; box-shadow: 0 0 15px #b45309; }

        .rank {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-secondary);
            width: 40px;
            text-align: center;
        }

        .card[data-rank="1"] .rank { color: #fbbf24; font-size: 2rem; }
        .card[data-rank="2"] .rank { color: #94a3b8; font-size: 1.8rem; }
        .card[data-rank="3"] .rank { color: #b45309; font-size: 1.6rem; }

        .avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .user-info {
            flex: 1;
        }

        .username {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .stats-row {
            display: flex;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .stat-icon {
            font-size: 1.1rem;
        }

        /* 레벨 프로그레스 바 */
        .progress-container {
            width: 130px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.5rem;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border-radius: 10px;
            position: relative;
        }
        
        /* 반짝이는 효과 */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .level-badge {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 4px 10px var(--accent-glow);
            text-align: center;
            min-width: 60px;
        }

        @media (max-width: 600px) {
            .card { flex-wrap: wrap; gap: 1rem; padding: 1.2rem; }
            .user-info { width: 100%; order: 3; }
            .stats-row { flex-wrap: wrap; gap: 0.8rem; }
            .rank { width: 30px; }
            .level-badge { order: 2; margin-left: auto; }
        }
    </style>
</head>
<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="container">
        <header>
            <h1>Server Leaderboard</h1>
            <p class="subtitle">Experience & Voice Activity Stats</p>
        </header>

        <div class="leaderboard">
            {% for user in users %}
            <div class="card" data-rank="{{ loop.index }}">
                <div class="rank">#{{ loop.index }}</div>
                <img src="{{ user['avatar_url'] }}" alt="Avatar" class="avatar">
                
                <div class="user-info">
                    <div class="username">{{ user['username'] }}</div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <span class="stat-icon">✨</span> XP: {{ user['xp'] }} / {{ user['req_xp'] }}
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">🎙️</span> Time: {{ user['total_seconds'] }}
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: {{ user['xp_percent'] }}%;"></div>
                    </div>
                </div>

                <div class="level-badge">LV. {{ user['level'] }}</div>
            </div>
            {% else %}
            <div class="card" style="justify-content: center;">
                <p style="color: var(--text-secondary); text-align: center;">No stats recorded yet.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
